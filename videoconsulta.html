<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Contactar con Especialista | Videoconsulta</title>
    <meta name="description" content="Reservá tu videoconsulta. Evaluación integral: hormonal, nutricional y vitamínica. Un plan diseñado para vos.">
    <meta property="og:title" content="Contactar con Especialista | Videoconsulta">
    <meta property="og:description" content="Evaluación integral personalizada. Encontramos lo que nadie había visto.">
    <meta property="og:image" content="https://drjuantessari.com.ar/logosinfondo.webp">
    <link rel="icon" href="logosinfondo.webp" type="image/webp">

    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Lato:wght@300;400;700;900&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "primary-dark": "#1d4ed8",
                        "secondary": "#1e3a8a",
                        "accent": "#60a5fa",
                        "whatsapp": "#25D366",
                        "navy-dark": "#0f172a",
                        "navy-deep": "#020617",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Merriweather", "serif"],
                        "body": ["Open Sans", "sans-serif"],
                        "cursive": ["Dancing Script", "cursive"],
                    },
                },
            },
        }
    </script>
    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '792002367314560');

</head>
<body class="bg-[#0f172a] text-[#111418] dark:text-white font-body h-[100svh] w-full overflow-hidden flex flex-col">

    <main class="flex-grow flex items-center justify-center p-4 w-full relative">

        <!-- Decoration Background -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
            <div class="absolute -top-20 -left-20 w-64 h-64 bg-primary opacity-10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-accent opacity-10 rounded-full blur-3xl"></div>
        </div>

        <!-- Contenedor Principal -->
        <div class="w-full max-w-lg relative z-10 flex flex-col justify-center">

            <div class="bg-white dark:bg-gray-800 p-6 md:p-8 rounded-2xl shadow-2xl border-2 border-gray-300 dark:border-gray-600 animate-fade-in-up flex flex-col">

                <!-- Ícono + título -->
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 rounded-full flex items-center justify-center mx-auto mb-4 text-primary">
                        <span class="material-symbols-outlined text-4xl">videocam</span>
                    </div>
                    <h1 class="text-xl md:text-2xl font-extrabold font-display text-gray-900 dark:text-white mb-1">
                        Tus datos
                    </h1>
                    <p class="text-gray-500 dark:text-gray-400 text-sm">
                        Completá el formulario y te contactamos a la brevedad
                    </p>
                </div>

                <!-- Formulario -->
                <form id="whatsappForm" onsubmit="handleSubmit(event)" class="flex flex-col gap-4 px-1 pb-1">

                    <!-- Nombre y Apellido -->
                    <input
                        id="inputName"
                        type="text"
                        required
                        placeholder="Nombre y Apellido"
                        class="h-12 md:h-14 w-full rounded-xl border-gray-200 bg-gray-50 px-4 text-[16px] focus:border-primary focus:ring-primary dark:border-gray-700 dark:bg-gray-900/50 dark:text-white"
                    />

                    <!-- Edad -->
                    <input
                        id="inputEdad"
                        type="number"
                        required
                        min="1"
                        max="120"
                        placeholder="Edad"
                        class="h-12 md:h-14 w-full rounded-xl border-gray-200 bg-gray-50 px-4 text-[16px] focus:border-primary focus:ring-primary dark:border-gray-700 dark:bg-gray-900/50 dark:text-white"
                    />

                    <!-- Contame más -->
                    <textarea
                        id="inputDesc"
                        required
                        rows="4"
                        placeholder="Contame un poco más sobre tu caso..."
                        class="w-full rounded-xl border-gray-200 bg-gray-50 px-4 py-3 text-[16px] focus:border-primary focus:ring-primary dark:border-gray-700 dark:bg-gray-900/50 dark:text-white resize-none"
                    ></textarea>

                    <!-- Botón -->
                    <button
                        type="submit"
                        id="submitBtn"
                        class="h-14 w-full rounded-xl bg-[#25D366] hover:bg-[#20db5b] text-white font-bold text-sm md:text-base transition-transform active:scale-95 shadow-lg uppercase tracking-wide flex items-center justify-center gap-2 mt-2"
                    >
                        <svg class="w-6 h-6 fill-current shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3 18.6-68.1-4.4-6.9c-18.6-29.5-28.4-64.3-28.4-100.4 0-101.3 82.2-183.7 183.7-183.7 49 0 95.1 19.1 129.8 53.8 34.7 34.7 53.8 80.8 53.8 129.8 0 101.3-82.2 183.7-183.7 183.7zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7 .9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
                        <span id="btnText">Contactar con especialista</span>
                    </button>

                    <p class="text-xs text-center text-gray-400">Te contactamos por WhatsApp a la brevedad</p>
                </form>

            </div>
        </div>
    </main>

    <!-- Floating WhatsApp Button -->
    <a href="#" class="fixed bottom-6 right-6 z-50 bg-[#25D366] hover:bg-[#20db5b] text-white px-3 py-2 md:px-4 md:py-3 rounded-full shadow-2xl flex items-center gap-2 transition-transform hover:scale-105" onclick="event.preventDefault(); openWhatsApp();">
        <span class="material-symbols-outlined text-xl md:text-2xl">chat</span>
        <span class="font-bold text-xs md:text-base">Consultas?</span>
    </a>

    <script>
    const WHATSAPP_NUMBER = "5491126882414"; // ← número del especialista

    function handleSubmit(e) {
        e.preventDefault();

        const name = document.getElementById('inputName').value.trim();
        const edad = document.getElementById('inputEdad').value.trim();
        const desc = document.getElementById('inputDesc').value.trim();
        const btn  = document.getElementById('submitBtn');
        const txt  = document.getElementById('btnText');

        try { fbq('track', 'Lead'); } catch(_) {}

        let msg = `VIDEOCONSULTA — Medicina Funcional 🩺\n\n`;
        msg += `Nombre: ${name}\n`;
        msg += `Edad: ${edad} años\n`;
        msg += `Caso: ${desc}\n`;

        const url = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`;

        btn.disabled = true;
        txt.textContent = 'Abriendo WhatsApp...';
        btn.classList.add('opacity-75', 'cursor-not-allowed');

        window.open(url, '_blank');

        setTimeout(() => {
            btn.disabled = false;
            txt.textContent = 'Contactar con especialista';
            btn.classList.remove('opacity-75', 'cursor-not-allowed');
        }, 3000);
    }

    function openWhatsApp() {
        try { fbq('track', 'Contact'); } catch(_) {}
        setTimeout(() => {
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=Hola,%20tengo%20una%20consulta.`, '_blank');
        }, 300);
    }

    document.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('blur', () => {
            setTimeout(() => {
                if (!['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }, 200);
        });
    });
    </script>
</body>
</html>
